<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        /* Redundant, because the UA stylesheet sets this */
        :root {
            view-transition-name: root;
        }

        /* This adds an extra animation to the .box, to make sure getAnimations can filter it out */
        @keyframes wobble {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .box {
            animation: wobble 1s ease infinite alternate;
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
